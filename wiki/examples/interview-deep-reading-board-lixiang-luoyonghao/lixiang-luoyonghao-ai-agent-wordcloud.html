  <script>
    const keywords = [
      {
        term: "机器人",
        count: 103,
        group: "car",
        x: 50,
        y: 48,
        tone: "warm",
        evidence: [
          ["具身智能定义", "李想把具身智能解释为物理世界里的机器获得传感器、模型和处理器后开始工作，机器人只是其中一种形态。", "访谈中段：罗永浩请他向普通观众解释具身智能。"],
          ["商业机会", "他认为人形机器人的核心机会不在表演式任务，而在真实场景里机器难以完成的上料、补给、搬运等环节。", "机器人商业模式讨论段。"],
          ["行业基础设施", "到访谈后段，理想被描述为希望给机器人行业提供芯片、预训练模型等基础设施，而不是只做单一终端。", "理想系联盟和机器人行业协同段。"]
        ]
      },
      {
        term: "AI",
        count: 100,
        group: "ai",
        x: 36,
        y: 38,
        tone: "dark",
        evidence: [
          ["两条分支", "李想把 AI 分成泛化信息获取和进入任务链条的 Agent；前者像搜索升级，后者要嵌入工作场景。", "开场谈过去两百多天学 AI 后。"],
          ["生产力和劳动力", "他强调 AI 的价值更偏效率和结果，不主要提供情绪价值，因此离不开实际生产环境。", "普通用户为什么难感知 AI 能量的讨论。"],
          ["人类价值", "结尾用电影明线和暗线作比，技术讲清楚事情，人仍然提供魅力、情感和判断。", "访谈结尾谈《星际穿越》。"]
        ]
      },
      {
        term: "芯片",
        count: 87,
        group: "car",
        x: 64,
        y: 40,
        tone: "warm",
        evidence: [
          ["旗舰产品", "开场介绍 L9 Livis 时，芯片和底盘是产品能力的两个主要入口，用来承接智能化和驾乘体验。", "开场产品介绍。"],
          ["行业协同", "后段谈理想系生态时，芯片被放到机器人行业基础设施中，和预训练模型一起支持外部团队。", "机器人创业与理想系联盟段。"],
          ["海外通用能力", "出海讨论里，车内 Agent、ChatBot、知识图谱、记录和个性化被视作跨市场通用能力，硬件算力是底座之一。", "海外软件生态适配段。"]
        ]
      },
      {
        term: "Agent",
        count: 47,
        group: "ai",
        x: 24,
        y: 53,
        tone: "green",
        evidence: [
          ["工作链条", "Agent 被区别于普通问答工具；它要有真实任务、生产环境和反馈，才能形成有效闭环。", "AI 两个分支的解释段。"],
          ["个人工作法", "李想描述自己用 Agent 先分析、出多个方案、打分、优化，再由人选择并执行。", "管理层如何被说服的案例段。"],
          ["反向意见", "他认为 AI 出方案会把博弈和反向意见带出来，减少只做陪跑方案的旧习惯。", "团队方案机制讨论段。"]
        ]
      },
      {
        term: "数据",
        count: 41,
        group: "ai",
        x: 72,
        y: 56,
        tone: "dark",
        evidence: [
          ["数据获取挑战", "高 token 用户提出的三大问题之一是数据获取：AI 要读到更完整、更有维度的数据。", "工作协同、数据、价值衡量三问题段。"],
          ["数仓验证", "战略小组做 Cowork Demo 时，和数仓团队验证数据打通、云端/本地模型分工以及价值衡量。", "战略小组 Demo 案例段。"],
          ["治理边界", "这篇材料对本 repo 的启发不是放开数据库，而是要做受控证据、权限和可审查链路。", "本仓 source note 的 Adaptation Boundary。"]
        ]
      },
      {
        term: "具身智能",
        count: 33,
        group: "car",
        x: 52,
        y: 25,
        tone: "warm",
        evidence: [
          ["概念解释", "面向大众时，具身智能被讲成物理世界机器拥有眼睛、大脑和心脏后执行任务。", "具身智能定义段。"],
          ["形态不等于人形", "他用车、飞机、咖啡机等例子说明，不是所有具身智能都需要做人形。", "机器人形态效率讨论段。"],
          ["公司愿景", "十年后理想被描述为要在具身领域提供保洁、司机、助理等生活服务。", "访谈尾声谈理想未来。"]
        ]
      },
      {
        term: "效率",
        count: 29,
        group: "org",
        x: 31,
        y: 67,
        tone: "green",
        evidence: [
          ["核心价值", "李想多次把 AI 的直接效果落在效率提升，而不是情绪价值或概念热度。", "普通用户感知 AI 价值的讨论。"],
          ["增效不降本", "他把公司使用 AI 的方向说成增效：希望同样组织规模承载更大收入，而不是优先裁员。", "裁员和产业规模讨论段。"],
          ["局部与整体", "单点效率高不等于整体价值，工作协同、数据和价值衡量必须连成生产链条。", "高 token 用户提出三大问题段。"]
        ]
      },
      {
        term: "方案",
        count: 19,
        group: "org",
        x: 48,
        y: 70,
        tone: "green",
        evidence: [
          ["多方案机制", "李想用 Agent 做任务时会要求多个方案并评分，而不是只给一个默认答案。", "Agent 改变工作方式段。"],

          ["反向意见", "AI 生成方案时能附带反向意见，让不同观点更容易被拿到桌面上讨论。", "AI 带来博弈和反向意见段。"]
        ]
      },
      {
        term: "专业",
        count: 16,
        group: "org",
        x: 17,
        y: 35,
        tone: "green",
        evidence: [
          ["不是简单替代", "李想反驳专业工作会被普通人直接替代，认为专业人士用 AI 后能力会被放大。", "裁人、人才标准和专业工作讨论段。"],
          ["Demo 后工程化", "战略小组能做验证 Demo，但全员部署仍需工程师做专业开发和规模化。", "Cowork Demo 案例段。"],
          ["新高度", "专业价值从写标准文档转向把问题变成可验证、可部署、可审查的对象。", "产品经理与战略研究人员角色讨论段。"]
        ]
      },
      {
        term: "生产环境",
        count: 13,
        group: "ai",
        x: 43,
        y: 52,
        mobile: [40, 61],
        tone: "dark",
        evidence: [
          ["Agent 前提", "李想明确把 Agent 的有效性绑定到完整工作生产环境：没有任务链条，就很难获得反馈。", "AI 两个分支解释段。"],
          ["个人公司边界", "他对一个人公司转向谨慎，原因是稳定生产环境的建立很难，不是模型更新就能解决。", "个人公司讨论段。"],
          ["业务重构案例", "公司里高强度使用 token 的人，实际在重构自己的业务流程，而不是只试用工具。", "内部 token 消耗前二十访谈段。"]
        ]
      },
      {
        term: "战略",
        count: 12,
        group: "org",
        x: 70,
        y: 30,
        tone: "green",

          ["车和眼镜", "他特别强调车上和后续眼镜都要先把记录做好，这是 Agent to C 的底层体验。", "访谈第 646 行。"]
        ]
      },
      {

        count: 4,

        x: 68,
        y: 25,
        mobile: [72, 25],
        tone: "dark",
        evidence: [

          ["简单参数记忆", "李想后面把这一层称为简单参数记忆，目的是避免和 Agent、ChatBot、RAG 混在一起。", "访谈第 654 行。"],
          ["系统架构", "个性化和 Agent、ChatBot、知识图谱、记录一起构成系统级 Agent 架构。", "访谈第 590-592 行。"]
        ]
      },
      {
        term: "ChatBot",
        count: 5,
        group: "ai",
        x: 74,
        y: 36,
        mobile: [76, 39],
        tone: "dark",
        evidence: [
          ["第二层能力", "ChatBot 承接泛化知识和信息获取，和 Agent 共用或切换不同大模型。", "访谈第 592、608、636 行。"],
          ["不要混用", "李想反复强调 Agent 做 Agent 的事，ChatBot 做 ChatBot 的事，避免一个入口吞掉所有需求。", "访谈第 654 行。"],
          ["出海通用", "海外智能化段再次出现 Agent 加 ChatBot，说明这不是局部功能，而是跨市场架构。", "访谈第 1134 行。"]
        ]
      },
      {
        term: "知识图谱",
        count: 5,
        group: "ai",
        x: 76,
        y: 48,
        mobile: [76, 49],
        tone: "warm",
        evidence: [
          ["控制层", "车辆控制被放到知识图谱层，因为它更稳定、更可靠，也更能解决确定性。", "访谈第 592、636、650 行。"],
          ["效率与确定性", "李想直接把知识图谱和效率、确定性绑定，而不是把控制交给泛化 Agent。", "访谈第 650 行。"],
          ["系统组成", "知识图谱和记录、个性化一起，是车内系统级 Agent 架构的确定性底座。", "访谈第 654、1134 行。"]
        ]
      }
    ];

    const timelineStages = [
      {
        id: "learn-ai",
        time: "开场",
        title: "先把 AI 真用起来",
        summary: "从 Claude Code、OpenClaw、同事安装和 token 观察进入访谈。",
        terms: ["Claude Code", "OpenClaw", "token", "AI"]
      },
      {
        id: "agent-work-env",
        time: "AI 第一段",
        title: "Agent 必须有生产环境",
        summary: "把泛化搜索和 Agent 工作链条分开，强调任务、反馈和闭环。",
        terms: ["Agent", "生产环境", "反馈", "效率"]
      },
      {
        id: "talent-org",
        time: "组织段",
        title: "高 token 用户改变人才判断",
        summary: "不急着按旧标准裁人，专业人被 AI 放大，而不是被普通人替代。",
        terms: ["token", "裁人", "专业", "组织", "效率"]
      },
      {
        id: "cowork-demo",
        time: "协同段",
        title: "三大问题到 Cowork Demo",
        summary: "工作协同、数据获取、价值衡量先被做成可验证 Demo，再交给工程化。",
        terms: ["工作协同", "数据", "数仓", "Cowork", "Demo", "PRD", "工程师", "可验证"]
      },
      {
        id: "agent-to-c",
        time: "Agent to C",
        title: "记忆不是记忆，而是五类需求",
        summary: "从 Claude 记忆体验切入，把 C 端需求拆成任务、信息、控制、记录、个性化。",
        terms: ["记忆", "Agent to C", "上下文拼接", "五类需求", "泛化任务", "信息获取", "精确控制", "记录", "个性化", "ChatBot", "知识图谱"]
      },
      {
        id: "plan-workflow",
        time: "管理段",
        title: "Agent 改变方案工作法",
        summary: "分析、多方案、打分、博弈、优化、人来选择，组织从猜领导变成看证据。",
        terms: ["方案", "博弈", "确定性", "能力成长", "可验证", "战略"]
      },
      {
        id: "embodied-car",
        time: "车与具身",
        title: "具身智能和车内系统合流",
        summary: "机器人、底盘、线控、芯片不是孤立硬件，而是垂直系统能力。",
        terms: ["具身智能", "机器人", "底盘", "线控", "芯片", "精确控制", "知识图谱"]
      },
      {
        id: "overseas",
        time: "出海段",
        title: "智能化出海需要系统通用能力",
        summary: "Agent、ChatBot、知识图谱、记录和个性化被再次用于解释海外适配。",
        terms: ["出海", "利益联盟", "Agent", "ChatBot", "知识图谱", "记录", "个性化"]
      }
    ];

    const cloud = document.getElementById("cloud");
    const timeline = document.getElementById("timeline");
    const list = document.getElementById("evidenceList");
    const selectedWord = document.getElementById("selectedWord");
    const selectedMeta = document.getElementById("selectedMeta");
    const search = document.getElementById("search");
    const reset = document.getElementById("reset");
    const guide = document.getElementById("guide");
    const maxCount = Math.max(...keywords.map((item) => item.count));
    let selected = "记忆";
    let activeStage = "agent-to-c";
    let activeFilter = "all";
    let dragState = null;

    function fontSize(count) {
      const compact = window.matchMedia("(max-width: 560px)").matches;
      const base = compact ? 12 : 17;
      const range = compact ? 17 : 42;
      return Math.round(base + (count / maxCount) * range);
    }

    function renderCloud() {
      cloud.querySelectorAll(".keyword").forEach((node) => node.remove());
      keywords.forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "keyword draggable-keyword";
        button.dataset.term = item.term;
        button.dataset.group = item.group;
        button.dataset.tone = item.tone;
        const [left, top] = positionFor(item);
        button.style.left = `${left}%`;
        button.style.top = `${top}%`;
        button.style.fontSize = `${fontSize(item.count)}px`;
        button.textContent = item.term;
        button.addEventListener("click", () => selectKeyword(item.term));
        button.addEventListener("pointerdown", startDrag);
        cloud.appendChild(button);
      });
      applyFilters();
      selectKeyword(selected);
    }

    function renderTimeline() {
      timeline.innerHTML = timelineStages.map((stage) => `
        <button class="stage" type="button" data-stage="${escapeHtml(stage.id)}">
          <span class="time">${escapeHtml(stage.time)}</span>
          <b>${escapeHtml(stage.title)}</b>
          <span>${escapeHtml(stage.summary)}</span>
        </button>
      `).join("");
      timeline.querySelectorAll(".stage").forEach((button) => {
        button.addEventListener("click", () => selectStage(button.dataset.stage));
      });
      updateStageButtons();
    }

    function selectStage(stageId) {
      activeStage = stageId;
      updateStageButtons();
      const stage = timelineStages.find((entry) => entry.id === stageId);
      const firstTerm = stage?.terms.find((term) => keywords.some((item) => item.term === term));
      applyFilters();
      if (firstTerm) selectKeyword(firstTerm, true);
    }

    function selectKeyword(term, preserveStage = false) {
      selected = term;
      const item = keywords.find((entry) => entry.term === term);
      if (!item) return;
      if (!preserveStage) {
        const owningStage = timelineStages.find((stage) => stage.terms.includes(term));
        if (owningStage) activeStage = owningStage.id;
      }
      updateStageButtons();
      selectedWord.textContent = item.term;
      const stage = timelineStages.find((entry) => entry.id === activeStage);
      selectedMeta.textContent = `正文命中 ${item.count} 次 · ${labelForGroup(item.group)} · ${stage ? stage.time : "全篇"}`;
      list.innerHTML = item.evidence.map(([title, body, where]) => `
        <article class="evidence">
          <b>${escapeHtml(title)}</b>
          <p>${escapeHtml(body)}</p>
          <div class="where">${escapeHtml(where)}</div>
        </article>
      `).join("");
      cloud.querySelectorAll(".keyword").forEach((node) => {
        node.classList.toggle("active", node.dataset.term === term);
      });
      updateGuide();
      applyFilters();
    }

    function labelForGroup(group) {
      if (group === "ai") return "AI 工作";
      if (group === "org") return "组织判断";
      return "具身与车";
    }

    function positionFor(item) {
      const compact = window.matchMedia("(max-width: 560px)").matches;
      if (compact && item.mobile) return item.mobile;
      return [item.x, item.y];
    }

    function applyFilters() {
      const query = search.value.trim().toLowerCase();
      const stage = timelineStages.find((entry) => entry.id === activeStage);
      cloud.querySelectorAll(".keyword").forEach((node) => {
        const inMode = activeFilter === "all" || node.dataset.group === activeFilter;
        const inSearch = !query || node.dataset.term.toLowerCase().includes(query);
        const inStage = !stage || stage.terms.includes(node.dataset.term);
        node.classList.toggle("dimmed", !(inMode && inSearch && inStage));
      });
    }

    function updateStageButtons() {
      timeline.querySelectorAll(".stage").forEach((node) => {
        node.classList.toggle("active", node.dataset.stage === activeStage);
      });
    }

    function startDrag(event) {
      const node = event.currentTarget;
      node.setPointerCapture(event.pointerId);
      const rect = cloud.getBoundingClientRect();
      const nodeRect = node.getBoundingClientRect();
      dragState = {
        node,
        pointerId: event.pointerId,
        rect,
        offsetX: event.clientX - nodeRect.left - nodeRect.width / 2,
        offsetY: event.clientY - nodeRect.top - nodeRect.height / 2
      };
      node.classList.add("dragging");
      selectKeyword(node.dataset.term);
      node.addEventListener("pointermove", onDrag);
      node.addEventListener("pointerup", endDrag);
      node.addEventListener("pointercancel", endDrag);
    }

    function onDrag(event) {
      if (!dragState || event.pointerId !== dragState.pointerId) return;
      const x = clamp(((event.clientX - dragState.rect.left - dragState.offsetX) / dragState.rect.width) * 100, 5, 95);
      const y = clamp(((event.clientY - dragState.rect.top - dragState.offsetY) / dragState.rect.height) * 100, 8, 92);
      dragState.node.style.left = `${x}%`;
      dragState.node.style.top = `${y}%`;
      const item = keywords.find((entry) => entry.term === dragState.node.dataset.term);
      if (item) {
        item.x = x;
        item.y = y;
      }
      updateGuide();
    }

    function endDrag(event) {
      if (!dragState || event.pointerId !== dragState.pointerId) return;
      dragState.node.classList.remove("dragging");
      dragState.node.removeEventListener("pointermove", onDrag);
      dragState.node.removeEventListener("pointerup", endDrag);
      dragState.node.removeEventListener("pointercancel", endDrag);
      dragState = null;
    }

    function updateGuide() {
      const active = cloud.querySelector(`.keyword[data-term="${cssEscape(selected)}"]`);
      if (!active) return;
      const cloudRect = cloud.getBoundingClientRect();
      const activeRect = active.getBoundingClientRect();
      const x = activeRect.left + activeRect.width / 2 - cloudRect.left;
      const y = activeRect.top + activeRect.height / 2 - cloudRect.top;
      guide.setAttribute("x1", x);
      guide.setAttribute("y1", y);
      guide.setAttribute("x2", cloudRect.width - 38);
      guide.setAttribute("y2", 62);
    }

    function updateKeywordSizes() {
      cloud.querySelectorAll(".keyword").forEach((node) => {
        const item = keywords.find((entry) => entry.term === node.dataset.term);
        if (item) {
          const [left, top] = positionFor(item);
          node.style.left = `${left}%`;
          node.style.top = `${top}%`;
          node.style.fontSize = `${fontSize(item.count)}px`;
        }
      });
      updateGuide();
    }

    function restoreLayout() {
      const original = {
        "机器人": [50, 48], "AI": [36, 38], "芯片": [64, 40], "Agent": [24, 53], "数据": [72, 56],
        "具身智能": [52, 25], "效率": [31, 67], "方案": [48, 70], "专业": [17, 35], "生产环境": [43, 52],
        "战略": [70, 30], "线控": [82, 44], "组织": [58, 78], "token": [21, 78], "出海": [78, 69],
        "Claude Code": [28, 24], "OpenClaw": [20, 20], "工程师": [38, 83], "确定性": [64, 84], "反馈": [13, 58], "底盘": [88, 55],
        "Demo": [46, 17], "Cowork": [57, 15], "可验证": [24, 45], "数仓": [74, 18], "工作协同": [15, 70],
        "PRD": [34, 13], "博弈": [58, 62], "利益联盟": [86, 79], "裁人": [12, 26], "能力成长": [48, 88],
        "记忆": [36, 31], "Agent to C": [24, 40], "上下文拼接": [20, 48], "五类需求": [45, 33],
        "泛化任务": [27, 58], "信息获取": [31, 64], "精确控制": [63, 33], "记录": [56, 29],
        "个性化": [68, 25], "ChatBot": [74, 36], "知识图谱": [76, 48]
      };
      keywords.forEach((item) => {
        [item.x, item.y] = original[item.term];
        const node = cloud.querySelector(`.keyword[data-term="${cssEscape(item.term)}"]`);
        if (node) {
          node.style.left = `${item.x}%`;
          node.style.top = `${item.y}%`;
        }
      });
      updateGuide();
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return value.replace(/["\\]/g, "\\$&");
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    document.querySelectorAll(".mode").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".mode").forEach((node) => node.classList.remove("active"));
        button.classList.add("active");
        activeFilter = button.dataset.filter;
        applyFilters();
      });
    });

    search.addEventListener("input", applyFilters);
    reset.addEventListener("click", restoreLayout);
    window.addEventListener("resize", updateKeywordSizes);
    renderTimeline();
    renderCloud();
  </script>
</body>
</html>
